# cargo-deny configuration. Docs: https://embarkstudios.github.io/cargo-deny/
[advisories]
version = 2
# Deny any crate with a known security advisory.
yanked = "deny"
# Explicit, documented risk-acceptance for unavoidable transitive advisories
# (vulnerabilities + unmaintained crates). Any NEW advisory not listed here hard-fails.
ignore = [
    # RUSTSEC-2023-0071 (rsa 0.9.10 "Marvin Attack" timing sidechannel).
    # Source: jsonwebtoken (backend JWT auth). No patched rsa release exists.
    # Risk acceptance: rsahp is an internal-only AHP group-decision app; advanced
    # RSA timing sidechannel attacks are outside its threat model.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0194 / -0195 (quick-xml quadratic-time + NsReader memory DoS).
    # Source: transitive dev/build dependency. Risk acceptance: zero runtime risk —
    # the production binary does not parse untrusted XML.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # RUSTSEC-2026-0173 (proc-macro-error2 unmaintained).
    # Source: build-time proc-macro via sea-orm. No maintained replacement in use.
    # Risk acceptance: build-time only, version-locked upstream.
    "RUSTSEC-2026-0173",
    # RUSTSEC-2026-0192 (ttf-parser unmaintained).
    # Source: font stack via egui. No maintained replacement in use.
    # Risk acceptance: font parsing only, version-locked upstream.
    "RUSTSEC-2026-0192",
]

[bans]
# Warn (not deny) on duplicate crate versions — informational only.
multiple-versions = "warn"

[licenses]
version = 2
# Allowlist derived from `cargo deny check licenses` on the current tree.
# EXTEND this list with the actual licenses from Step 1 output before committing.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "BSD-1-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "GPL-2.0-only",
    "LGPL-2.1-or-later",
    "MIT-0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]

[licenses.private]
ignore = true
