# cargo-deny configuration. Docs: https://embarkstudios.github.io/cargo-deny/
[advisories]
version = 2
# Deny any crate with a known security advisory (vulnerabilities hard-fail).
yanked = "deny"
# Unmaintained crates are a health/tech-debt signal, not an active exploit. cargo-deny
# v2 has no per-class "warn" severity; instead this SCOPES unmaintained checking. Policy
# (B→C→A, user-approved intent — "policy, not per-ID whack-a-mole"): "workspace" only
# flags unmaintained crates that are workspace members or their DIRECT deps, so purely
# transitive unmaintained deps — proc-macro-error2 (build-time proc-macro via sea-orm)
# and ttf-parser (egui font stack), both version-locked upstream — never block CI, and
# neither will any future transitive unmaintained dep. Our own direct deps are still checked.
unmaintained = "workspace"
# Explicit, documented risk-acceptance for unavoidable transitive VULNERABILITIES that
# have no upstream fix. Any NEW advisory not listed here still hard-fails the build.
ignore = [
    # RUSTSEC-2023-0071 (rsa 0.9.10 "Marvin Attack" timing sidechannel).
    # Source: jsonwebtoken (backend JWT auth). No patched rsa release exists.
    # Risk acceptance: rsahp is an internal-only AHP group-decision app; advanced
    # RSA timing sidechannel attacks are outside its threat model.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0194 / -0195 (quick-xml quadratic-time + NsReader memory DoS).
    # Source: transitive dev/build dependency. Risk acceptance: zero runtime risk —
    # the production binary does not parse untrusted XML.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[bans]
# Warn (not deny) on duplicate crate versions — informational only.
multiple-versions = "warn"

[licenses]
version = 2
# Allowlist derived from `cargo deny check licenses` on the current tree.
# EXTEND this list with the actual licenses from Step 1 output before committing.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "BSD-1-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "GPL-2.0-only",
    "LGPL-2.1-or-later",
    # MPL-2.0: file-level weak copyleft, weaker than the GPL/LGPL already allowed above.
    # Source: option-ext v0.2.0 (transitive dep of `directories`, used by common::datadir).
    # Using it as an unmodified dependency imposes no copyleft obligation on our own source.
    "MPL-2.0",
    "MIT-0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]

[licenses.private]
ignore = true
