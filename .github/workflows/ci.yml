name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build_and_verify:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libasound2-dev libudev-dev libxkbcommon-dev libwayland-dev libx11-xcb-dev libxcb-shape0-dev libxcb-xfixes0-dev
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy, llvm-tools-preview

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Install test tooling
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest,cargo-llvm-cov

    - name: Lint and Format
      run: |
        cargo fmt --all -- --check
        cargo clippy -- -D warnings
        
    - name: Run tests with coverage (Linux)
      if: runner.os == 'Linux'
      env:
        # Select the `ci` nextest profile via env — `cargo llvm-cov nextest --profile`
        # would collide with cargo-llvm-cov's own build-profile flag.
        NEXTEST_PROFILE: ci
      run: cargo llvm-cov nextest --lcov --output-path lcov.info

    - name: Run tests (Windows/macOS)
      if: runner.os != 'Linux'
      run: cargo nextest run --profile ci

    - name: Upload coverage
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-lcov
        path: lcov.info
        if-no-files-found: warn

    - name: Build Everything
      run: cargo build --release

    - name: Run Verification Script (Contract Test)
      shell: pwsh
      run: ./verify.ps1
      
    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failure-logs-${{ matrix.os }}
        path: |
          logs/
          rsahp.db

    - name: Upload Release Binaries
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: rsahp-release-${{ matrix.os }}
        path: |
          target/release/frontend
          target/release/frontend.exe
          target/release/backend
          target/release/backend.exe
        if-no-files-found: ignore
        retention-days: 1
