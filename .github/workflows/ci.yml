name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build_and_verify:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Run Lefthook (Pre-Commit Equivalent)
      run: |
        cargo fmt --all -- --check
        cargo clippy -- -D warnings
        cargo test --lib
      
    - name: Build Everything
      run: cargo build --release

    - name: Run Verification Script (Contract Test)
      run: pwsh ./verify.ps1
      
    - name: Upload Logs on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failure-logs
        path: |
          logs/
          rsahp.db
